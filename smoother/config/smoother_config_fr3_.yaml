# Smoother Configuration
# This file configures the joint command smoothing functionality

# Basic Critical Damped Smoother (recommended for general use)
critical_damped:
  type: "critical_damped"
  omega_n: 25.0           # Natural frequency (rad/s) - Controls response speed
                          # 15-20: Soft/compliant, slower response
                          # 20-30: Balanced (default 25)
                          # 30-40: Fast response, stiffer
  zeta: 1.0              # Damping ratio (1.0 = critical damping, no overshoot)
  control_frequency: 800  # Internal control loop frequency (Hz)

# Adaptive Critical Damped Smoother (adjusts response based on error)
adaptive_critical_damped:
  type: "adaptive_critical_damped"
  
  # Base parameters
  omega_n: 25.0           # Default natural frequency
  zeta: 1.0              # Critical damping
  control_frequency: 500  # Internal frequency (Hz)
  
  # Adaptive parameters
  omega_n_min: 15.0      # Minimum omega_n (soft mode for small errors)
  omega_n_max: 40.0      # Maximum omega_n (fast mode for large errors)
  
  error_thresholds:
    low: 0.01            # Error below this = soft mode (rad, ~0.57°)
    high: 0.1            # Error above this = fast mode (rad, ~5.7°)
  
  transition: "sigmoid"   # Transition type: "linear" or "sigmoid"
  omega_change_limit: 5.0 # Max omega_n change per update (rad/s)

# Ruckig Smoother (S-curve with jerk limiting)
ruckig:
  type: "ruckig"
  control_frequency: 800  # Internal control loop frequency (Hz)
  min_position: [-2.7437, -1.7837, -2.9007, -3.0421, -2.8065,  0.5445, -3.0159] # rad
  max_position: [ 2.7437,  1.7837,  2.9007, -0.1518,  2.8065,  4.5169,  3.0159]
  # max_velocity:  [2.62, 2.62, 2.62, 2.62, 5.26, 4.18, 5.26]      # rad/s per joint
  # max_acceleration: [10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0]  # rad/s² per joint
  # max_jerk: [5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 5000.0]    # rad/s³ per joint
  max_velocity: [1.31, 1.31, 1.31, 1.31, 2.63, 2.09, 2.63] # rad/s per joint
  max_acceleration: [5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0] # rad/s² per joint
  max_jerk: [2500.0, 2500.0, 2500.0, 2500.0, 2500.0, 2500.0, 2500.0]
  # 降低速度/加速度/跃度， 使得运动更平滑， 减少振动
  # max_velocity:      [0.6986666667, 0.6986666667, 0.6986666667, 0.6986666667, 1.4026666667, 1.1146666667, 1.4026666667]  # rad/s
  # max_acceleration:  [2.6666666667, 2.6666666667, 2.6666666667, 2.6666666667, 2.6666666667, 2.6666666667, 2.6666666667]  # rad/s²
  # max_jerk:          [1333.3333333, 1333.3333333, 1333.3333333, 1333.3333333, 1333.3333333, 1333.3333333, 1333.3333333]  # rad/s³
  # max_velocity: [0.34933333335, 0.34933333335, 0.34933333335, 0.34933333335, 0.70133333335, 0.55733333335, 0.70133333335]   # rad/s
  # max_acceleration: [1.33333333335, 1.33333333335, 1.33333333335, 1.33333333335, 1.33333333335, 1.33333333335, 1.33333333335]   # rad/s²
  # max_jerk: [666.66666665, 666.66666665, 666.66666665, 666.66666665, 666.66666665, 666.66666665, 666.66666665]     # rad/s³
  
  synchronization: true   # Enable synchronization
  sync_mode: "time"      # Sync mode: "phase", "time", or "none"
                          # - "phase": Synchronize velocity profiles (smooth coordinated motion)
                          # - "time": All joints finish at same time (may cause sudden starts/stops)
                          # - "none": Each joint optimizes independently (fastest per-joint)

# Usage Examples in motion_config.yaml:
# 
# motion_factory:
#   use_smoother: true
#   smoother_config:
#     type: "adaptive_critical_damped"  # or "critical_damped"
#     omega_n: 25.0
#     omega_n_min: 15.0
#     omega_n_max: 40.0
#     error_thresholds:
#       low: 0.01
#       high: 0.1
#     transition: "sigmoid"