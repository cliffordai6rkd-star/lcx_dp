whole_body_ik:
  tracking_frames:
  - name: "left_hand_palm_link"
    dim: [4, 4]
    require_trans: true
    trans_scalar: 1.0
    require_rot: true
    rot_scalar: 1.0
  - name: "right_hand_palm_link"
    dim: [4,4]
    require_trans: true
    trans_scalar: 1.0
    require_rot: true
    rot_scalar: 1.0
  show_debug: false
  trans_weight: 80
  rot_weight: 5
  smooth_weight: 0.02
  regularization_weight: 0.002
  target_threshold: 0.00001
  