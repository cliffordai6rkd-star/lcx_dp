save_path_prefix: "solid_transfer"
task_description: "transfer rice from the box into the bowl"
task_description_goal: "move all rice grains from the source box to the target bowl without spilling"
task_description_step: |
  step1: locate the box containing rice on the table.
  step2: position the tool (e.g., scoop or gripper) above the rice pile.
  step3: collect a portion of rice from the box.
  step4: lift the tool while ensuring no rice falls.
  step5: locate the target bowl on the table.
  step6: move the tool to a position above the bowl's center.
  step7: pour/deposit the rice into the bowl.

