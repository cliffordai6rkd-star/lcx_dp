# usage platform
# motion_config: !include factory/components/motion_configs/fr3_with_franka_hand_ik_tactile.yaml
motion_config: !include factory/components/motion_configs/fr3_with_franka_hand_ik.yaml

target_site_name: ["target_site"]
tcp_visualization_site: ["TCP_site"]

teleop_interface: "space_mouse"
interface_config: !include teleop/space_mouse/single_space_mouse_cfg.yaml
inteface_output_mode: "relative"

# teleoperation used parameter
# if you are using mujoco simulation target instead of teleoperation device,
# set use_simulation_target as true
use_simulation_target: true
teleoperation_loop_time: 0.005

# reset related
# joint
reset_arm_command: [-0.0016708960744338654, -0.7861180279768628, 
                      0.0011242960248884306, -2.3515749674770583, 
                      -0.0019059956649008665, 1.581831610375827, 
                      0.7904221443917989]
reset_space: "joint"   
