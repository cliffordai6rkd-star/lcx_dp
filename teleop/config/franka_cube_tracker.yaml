# Task configuration (will be populated dynamically by task selection)
save_path_prefix: "test"
task_description: "pick up the peg on the table and put it in the hole"
task_description_goal: "pick up the peg on the table and place it in the correct hole"
task_description_step:
  "step1: find the peg on the table. step2: go to the location of the peg
  step3: pick up the only peg on the table. step4: find the only hole in the peg station. step5:
  go to the top of the hole. step6: place the peg into the hole"
