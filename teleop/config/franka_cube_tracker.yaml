# usage platform
motion_config: !include factory/components/motion_configs/fr3_ik_only.yaml

target_site_name: ["target_site"]
tcp_visualization_site: ["TCP_site"]

teleop_interface: "cube_tracker"
interface_config: !include teleop/aruco_cube_tracker/config/cube_tracker_right_only_fr3_cfg.yaml
inteface_output_mode: "absolute_delta"

# teleoperation used parameter
# if you are using mujoco simulation target instead of teleoperation device,
# set use_simulation_target as true
use_simulation_target: true
teleoperation_loop_time: 0.005

