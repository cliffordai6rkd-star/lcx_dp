name: hirol_fr3_3cam_insert_tube

# Converted replay buffer verified from:
# data_converter/dataset/1113_left_fr3_insert_pinboard_53ep.zarr
# Raw RGB frames are stored as 480x640 uint8 and resized by HirolDataset
# to the image_shape below during training.
image_shape: &image_shape [3, 128, 128]
shape_meta: &shape_meta
  obs:
    ee_cam_color:
      shape: *image_shape
      type: rgb
    third_person_cam_color:
      shape: *image_shape
      type: rgb
    side_cam_color:
      shape: *image_shape
      type: rgb
    state_ee:
      shape: [15]
      type: low_dim
      components:
        ee_position: [0, 3]
        ee_quaternion: [3, 7]
        joint_positions: [7, 14]
        gripper_width: [14, 15]
  action:
    shape: [8]
    min: [-2.96, -1.76, -2.96, -3.07, -2.96, -2.09, -2.96, 0.0]
    max: [2.96, 1.76, 2.96, -0.07, 2.96, 3.75, 2.96, 0.08]

env_runner:
  _target_: diffusion_policy.env_runner.hirol_fr3_runner.HirolFr3Runner
  test_start_seed: 100000

dataset:
  use_parallel_loading: False
  load_into_memory: False
  preload_images: False
  _target_: diffusion_policy.dataset.hirol_dataset.HirolDataset
  shape_meta: *shape_meta
  dataset_path: ${dataset_path}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  n_latency_steps: ${n_latency_steps}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
