robot:
  name: "fr3"
  model_path: "assets/franka_fr3/fr3.xml"
  initial_position: [0.0, 0.0, 0.0]
  initial_orientation: [1.0, 0.0, 0.0, 0.0]
  fix_base: true  # false for floating base, true for fixed base
  grippers:
    gripper:
      type: "franka_hand"
      model_path: "assets/franka_fr3/hand.xml"
      attachment_site: "attachment_site"

scene_objects:
  - name: "table"
    model_path: "assets/scene_objects/cube_like/side_table_simple.xml"
    initial_position: [0.6, 0.0, 0.0]
    initial_orientation: [0.0, 0.0, 0.0, 1.0]
    fix_base: true  # table is fixed to ground
  
  - name: "box_1"
    model_path: "assets/scene_objects/box/box.xml"
    initial_position: [0.3, 0.2, 0.5]
    initial_orientation: [0.0, 0.0, 0.0, 1.0]
    fix_base: false  # box can move freely

simulation:
  timestep: 0.001
  viewer_dt: 0.02
  gravity: [0.0, 0.0, -9.81]