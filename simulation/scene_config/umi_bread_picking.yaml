  #   initial_orientation: [0.0, 1.0, 0.0, 0.0]  # x,y,z,w format
  #   fix_base: true  # mocap objects don't need free joints
  #   mocap: true  # Special flag for mocap object

# Camera configurations
cameras:
  # Fixed cameras in world coordinate system
  - name: "side_cam"
    position: [0.5, 0.8, 0.4]
    xyaxes: [-1, 0, 0, 0, -0.5, 0.866]
    fovy: 45

  - name: "third_person_cam"
    position: [1.2, 0.0, 0.8]
    xyaxes: [0, 1, 0, -0.866, 0, 0.5]
    fovy: 45

  # End-effector camera (attached to robot gripper)
  # Note: This camera is already defined in the robot XML
  # (fr3_pika_ati.xml) and will be automatically included
  # when the robot is loaded. We keep this entry here for
  # documentation and consistency with sensor_dict in
  # mujoco config. If you need to override the camera
  # parameters, you can do so in the robot XML file.

simulation:
  timestep: 0.001
  # dt: 0.002
  viewer_dt: 0.02
