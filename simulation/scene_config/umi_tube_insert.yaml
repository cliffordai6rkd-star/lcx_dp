robot:
  name: "fr3"
  model_path: "assets/franka_fr3/dual_fr3_pika_ati.xml"
  initial_position: [0.0, 0, -10]
  initial_orientation: [1.0, 0.0, 0.0, 0.0]
  fix_base: true

scene_objects:
  - name: "tube_insert_scene"
    model_path: "assets/scene_objects/umi_insert_tube/tube_insert_scene.xml"
    initial_position: [0, 0, 0]  
    initial_orientation: [0.7071068,0, 0, 0.7071068 ]
    fix_base: true  # table is fixed to ground

  # Mocap objects for teleoperation visualization
  - name: "targetH"
    model_path: "assets/scene_objects/mocap/targetH_mocap.xml"
    initial_position: [0, 0, 0.8]
    initial_orientation: [0.0, 1.0, 0.0, 0.0]  # x,y,z,w format
    fix_base: true  # mocap objects don't need free joints
    mocap: true  # Special flag for mocap object


  - name: "targetL"
    model_path: "assets/scene_objects/mocap/targetL_mocap.xml"
    initial_position: [0.3, 0.3, 0.45]
    initial_orientation: [0.0, 1.0, 0.0, 0.0]  # x,y,z,w format
    fix_base: true  # mocap objects don't need free joints
    mocap: true  # Special flag for mocap object

  - name: "targetR"
    model_path: "assets/scene_objects/mocap/targetR_mocap.xml"
    initial_position: [0.3, -0.3, 0.45]
    initial_orientation: [0.0, 1.0, 0.0, 0.0]  # x,y,z,w format
    fix_base: true  # mocap objects don't need free joints
    mocap: true  # Special flag for mocap object

  - name: "TCPL"
    model_path: "assets/scene_objects/mocap/tcpl_mocap.xml"
    initial_position: [0.365, 0.0, 0.4]
    initial_orientation: [0.0, 1.0, 0.0, 0.0]  # x,y,z,w format
    fix_base: true  # mocap objects don't need free joints
    mocap: true  # Special flag for mocap object
  
  - name: "TCPR"
    model_path: "assets/scene_objects/mocap/tcpr_mocap.xml"
    initial_position: [0.365, 0.0, 0.4]
    initial_orientation: [0.0, 1.0, 0.0, 0.0]  # x,y,z,w format
    fix_base: true  # mocap objects don't need free joints
    mocap: true  # Special flag for mocap object

# Camera configurations
cameras:
  # Fixed cameras in world coordinate system
  - name: "side_cam"
    position: [0.5, 0.8, 0.4]
    xyaxes: [-1, 0, 0, 0, -0.5, 0.866]
    fovy: 45

  - name: "third_person_cam"
    position: [1.2, 0.0, 0.8]
    xyaxes: [0, 1, 0, -0.866, 0, 0.5]
    fovy: 45

  # End-effector camera (attached to robot gripper)
  # Note: This camera is already defined in the robot XML
  # (fr3_pika_ati.xml) and will be automatically included
  # when the robot is loaded. We keep this entry here for
  # documentation and consistency with sensor_dict in
  # mujoco config. If you need to override the camera
  # parameters, you can do so in the robot XML file.

simulation:
  timestep: 0.001
  # dt: 0.002
  viewer_dt: 0.02
  gravity: [0.0, 0.0, -9.81]
  max_traj_len: 0
  # extra_render: true
