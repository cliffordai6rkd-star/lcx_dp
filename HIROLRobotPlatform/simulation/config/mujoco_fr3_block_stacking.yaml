mujoco:
  # Use scene_config_file to dynamically generate the scene
  scene_config_file: "simulation/scene_config/fr3_block_stacking.yaml"

  # Alternative: Use pre-generated XML file (comment out scene_config_file if using this)
  # base_xml_file: "generated_scene.xml"

  robot_xml: "assets/franka_fr3/fr3_pika_ati.xml"
  quat_sequence: "xyzw"
  dt: 0.002
  dof: [7]
  joint_names: ["fr3_joint1", "fr3_joint2", "fr3_joint3", "fr3_joint4", "fr3_joint5", "fr3_joint6", "fr3_joint7"]
  actuator_names: ["fr3_actuator1", "fr3_actuator2", "fr3_actuator3", "fr3_actuator4", "fr3_actuator5", "fr3_actuator6", "fr3_actuator7"]
  actuator_mode: ["position", "position", "position", "position", "position", "position", "position"]
  tool_infos:
    single:
      type: "gripper"
      joint_names: ["gripper_left_joint"]
      actuator_names: ["pika_gripper_actuator"]
  ee_site_name: "fr3_ee_attachment"
  base_body: ["base"]
  extra_render: true
  max_traj_len: 80
  use_custom_key_frame: true
  sensor_dict:
    ee_cam:
     resolution: [480, 640]
    side_cam:
     resolution: [480, 640]
    third_person_cam:
     resolution: [480, 640]
