# 叠方块任务特定配置
task_type: "block_stacking"
max_step_nums: 100

# 叠方块任务的checkpoint路径模式
checkpoint_patterns:
  - "fr3_block_stacking*"
  - "fr3_bs_*"
  - "fr3_blockstack*"
  - "*block*stack*"

# 夹爪控制策略配置
gripper_postprocess:
  enabled: true
  control_mode: "task_aware"  # 使用任务感知控制

  # 叠方块任务特定参数
  close_value_threshold: 0.02
  open_value_threshold: 0.95
  required_close_duration: 0.5  # 叠方块需要0.5s确认

  # 趋势检测参数
  trend_window_size: 8
  closing_trend_threshold: -0.0005
  opening_trend_threshold: 0.0005

  # 波形检测参数（用于打开检测）
  target_peak_count: 3
  peak_threshold: 0.95
  valley_threshold: 0.02

  # 保持参数
  min_holding_steps: 30  # 叠方块保持时间稍短

  # 抓取检测参数
  grasp_check_enabled: true
  grasp_check_delay: 45  # 叠方块检测稍快
  max_grasp_retries: 3
  retry_wait_time: 20
  min_grasp_width: 0.005
  max_grasp_width: 0.070

  # 任务完成检测
  task_completion_enabled: true
  task_completion_stable_time: 15
  task_completion_position_threshold: 0.005
  task_completion_max_holding: 80
  task_completion_force_open: true  # 叠方块完成后可以打开