# 插孔任务特定配置
task_type: "peg_in_hole"
max_step_nums: 550
gripper_lock_duration: 5.0  # 插孔任务标准夹爪锁定时间

# 插孔任务的checkpoint路径模式
checkpoint_patterns:
  - "fr3_peg_in_hole*"
  - "fr3_pih_*"
  - "*peg*hole*"

# 夹爪控制策略配置
gripper_postprocess:
  enabled: true
  control_mode: "task_aware"  # 使用任务感知控制

  # 插孔任务特定参数
  close_value_threshold: 0.02
  open_value_threshold: 0.95
  required_close_duration: 0.5  # 插孔任务需要0.5s确认

  # 趋势检测参数
  trend_window_size: 8
  closing_trend_threshold: -0.0005
  opening_trend_threshold: 0.0005

  # 波形检测参数（用于打开检测）
  target_peak_count: 3
  peak_threshold: 0.95
  valley_threshold: 0.02

  # 保持参数
  min_holding_steps: 45

  # 抓取检测参数
  grasp_check_enabled: true
  grasp_check_delay: 60
  max_grasp_retries: 3
  retry_wait_time: 23
  min_grasp_width: 0.005
  max_grasp_width: 0.070

  # 任务完成检测
  task_completion_enabled: true
  task_completion_stable_time: 20
  task_completion_position_threshold: 0.005
  task_completion_max_holding: 90
  task_completion_force_open: true  # 插孔完成后可以打开