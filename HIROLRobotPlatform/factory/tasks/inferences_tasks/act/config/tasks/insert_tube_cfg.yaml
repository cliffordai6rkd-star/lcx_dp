# 插管任务特定配置
task_type: "insert_tube"
max_step_nums: 600

# 插管任务的checkpoint路径模式
checkpoint_patterns:
  - "fr3_insert_tube*"
  - "fr3_it_*"
  - "fr3_tube*"
  - "*insert*tube*"
  - "*tube*insert*"

# 夹爪控制策略配置
gripper_postprocess:
  enabled: true
  control_mode: "task_aware"  # 使用任务感知控制

  # 插管任务特定参数（类似插孔，需要精确控制）
  close_value_threshold: 0.02
  open_value_threshold: 0.95
  required_close_duration: 0.6  # 插管任务需要0.6s确认（比插孔稍长）

  # 趋势检测参数
  trend_window_size: 8
  closing_trend_threshold: -0.0005
  opening_trend_threshold: 0.0005

  # 波形检测参数（用于打开检测）
  target_peak_count: 3
  peak_threshold: 0.95
  valley_threshold: 0.02

  # 保持参数
  min_holding_steps: 50  # 插管保持时间较长

  # 抓取检测参数
  grasp_check_enabled: true
  grasp_check_delay: 65  # 插管检测时间较长
  max_grasp_retries: 3
  retry_wait_time: 25
  min_grasp_width: 0.005
  max_grasp_width: 0.070

  # 任务完成检测
  task_completion_enabled: true
  task_completion_stable_time: 22
  task_completion_position_threshold: 0.005
  task_completion_max_holding: 95
  task_completion_force_open: true  # 插管完成后可以打开
