# 固体转移任务特定配置
task_type: "solid_transfer"
max_step_nums: 600
# gripper_lock_duration: 5.0  # 固体转移任务标准夹爪锁定时间

# 固体转移任务的checkpoint路径模式（默认分类）
checkpoint_patterns:
  - "*solid*transfer*"
  - "*object*transfer*"
  - "*pick*place*"
  - "pickplace*"

# 夹爪控制策略配置
gripper_postprocess:
  enabled: true
  control_mode: "task_aware"  # 使用任务感知控制

  # 固体转移任务特定参数
  always_closed: true  # 全程保持闭合

  # 禁用所有检测功能
  grasp_check_enabled: false
  task_completion_enabled: false

  # 安全参数（虽然不使用，但保持兼容性）
  min_grasp_width: 0.0001
  max_grasp_width: 0.070

  # 强制闭合参数
  force_closed_value: 0.0  # 始终发送闭合命令