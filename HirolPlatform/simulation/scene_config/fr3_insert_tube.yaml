robot:
  name: "fr3"
  model_path: "assets/franka_fr3/fr3_pika_ati.xml"
  initial_position: [0.0, 0.0, 0.0]
  initial_orientation: [1.0, 0.0, 0.0, 0.0]
  fix_base: true

scene_objects:
  - name: "table"
    model_path: "assets/scene_objects/cube_like/side_table_simple.xml"
    initial_position: [0.6, 0.0, 0.0]
    initial_orientation: [0.0, 0.0, 0.0, 1.0]
    fix_base: true

  - name: "it_base"
    model_path: "assets/scene_objects/insert_tube/base.xml"
    initial_position: [0.6, 0.0, 0.2]
    initial_orientation: [0.0, 0.0, 0.0, 1.0]
    fix_base: false

  - name: "it_tube"
    model_path: "assets/scene_objects/insert_tube/tube.xml"
    initial_position: [0.6, 0.0, 0.28]  # Lowered to be closer to insertion point
    initial_orientation: [0.0, 0.0, 0.0, 1.0]
    fix_base: false

  # Mocap objects for teleoperation visualization
  - name: "target"
    model_path: "assets/scene_objects/mocap/target_mocap.xml"
    initial_position: [0.3, 0.0, 0.45]
    initial_orientation: [0.0, 1.0, 0.0, 0.0]
    fix_base: true
    mocap: true

  - name: "TCP"
    model_path: "assets/scene_objects/mocap/tcp_mocap.xml"
    initial_position: [0.365, 0.0, 0.4]
    initial_orientation: [0.0, 1.0, 0.0, 0.0]
    fix_base: true
    mocap: true

# Camera configurations
cameras:
  - name: "side_cam"
    position: [0.5, 0.8, 0.4]
    xyaxes: [-1, 0,  0, 0, -0.5, 0.866]
    fovy: 45

  - name: "third_person_cam"
    position: [1.2, 0.0, 0.8]
    xyaxes: [0, 1, 0,  -0.866, 0, 0.5]
    fovy: 45

simulation:
  timestep: 0.001
  viewer_dt: 0.02
  gravity: [0.0, 0.0, -9.81]
