robot:
  name: "monte02"
  model_path: "assets/monte_02/urdf/monte02.xml"
  initial_position: [0.0, 0.0, 0.0]
  initial_orientation: [1.0, 0.0, 0.0, 0.0]
  fix_base: true  # false for floating base, true for fixed base

scene_objects:
  - name: "table"
    model_path: "assets/scene_objects/cube_like/side_table_simple.xml"
    initial_position: [0.6, 0.0, 0.0]
    initial_orientation: [0.0, 0.0, 0.0, 1.0]
    fix_base: true  # table is fixed to ground
  
  - name: "box_1"
    model_path: "assets/scene_objects/box/box_red.xml"
    initial_position: [0.4, 0.2, 0.5]
    initial_orientation: [0.0, 0.0, 0.0, 1.0]
    fix_base: false  # box can move freely

  - name: "box_2"
    model_path: "assets/scene_objects/box/box_blue.xml"
    initial_position: [0.6, 0, 0.5]
    initial_orientation: [0.0, 0.0, 0.0, 1.0]
    fix_base: false  # box can move freely

  - name: "box_3"
    model_path: "assets/scene_objects/box/box_yellow.xml"
    initial_position: [0.4, -0.2, 0.5]
    initial_orientation: [0.0, 0.0, 0.0, 1.0]
    fix_base: false  # box can move freely

  # Mocap objects for teleoperation visualization
  - name: "targetL"
    model_path: "assets/scene_objects/mocap/target_mocap.xml"
    initial_position: [0.53937852,  0.30041492,  1.22816289]
    # 0.7071068, 0, 0.7071068, 0; 0.0, 1.0, 0.0, 0.0
    initial_orientation: [0.31204498,  0.63402788, -0.32952908,  0.6261367]  # x,y,z,w format
    fix_base: true  # mocap objects don't need free joints
    mocap: true  # Special flag to indicate this is a mocap object (preserve original site names)

  - name: "targetR"
    model_path: "assets/scene_objects/mocap/target_mocap.xml"
    initial_position: [0.48501296, -0.24580759,  1.25566885]
    initial_orientation: [-0.16799126,  0.6332079, 0.18353992,  0.73289821]  # x,y,z,w format
    fix_base: true  # mocap objects don't need free joints
    mocap: true  # Special flag to indicate this is a mocap object (preserve original site names)

  - name: "TCPL_site"
    model_path: "assets/scene_objects/mocap/tcp_mocap.xml"
    initial_position: [0.365, 0.2, 0.75]
    initial_orientation: [0.7071068, 0, 0.7071068, 0]  # x,y,z,w format
    fix_base: true  # mocap objects don't need free joints
    mocap: true  # Special flag to indicate this is a mocap object (preserve original site names)

  - name: "TCPR_site"
    model_path: "assets/scene_objects/mocap/tcp_mocap.xml"
    initial_position: [0.365, -0.2, 0.75]
    initial_orientation: [0.7071068, 0, 0.7071068, 0]  # x,y,z,w format
    fix_base: true  # mocap objects don't need free joints
    mocap: true  # Special flag to indicate this is a mocap object (preserve original site names)

# Camera configurations
cameras:
  # Fixed cameras in world coordinate system
  - name: "side_cam"
    position: [0.5, 0.8, 0.4]
    xyaxes: [-1, 0,  0, 0, -0.5, 0.866]
    fovy: 45

  - name: "third_person_cam"
    position: [1.2, 0.0, 0.8]
    xyaxes: [0, 1, 0,  -0.866, 0, 0.5]
    fovy: 45

  # End-effector camera (attached to robot gripper)
  # Note: This camera is already defined in the robot XML (fr3_pika_ati.xml)
  # and will be automatically included when the robot is loaded.
  # We keep this entry here for documentation and consistency with sensor_dict in mujoco config.
  # If you need to override the camera parameters, you can do so in the robot XML file.

simulation:
  timestep: 0.001
  viewer_dt: 0.02
  gravity: [0.0, 0.0, -9.81]