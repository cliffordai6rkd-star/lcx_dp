robot:
  name: "unitree_g1"
  model_path: "assets/unitree_g1/g1_29dof_with_hand.xml"
  initial_position: [0.0, 0.0, 1.0]  # Start standing on ground
  initial_orientation: [0.0, 0.0, 0.0, 1.0]
  fix_base: false  # Humanoid robot needs free base for natural movement

scene_objects:
  - name: "table"
    model_path: "assets/scene_objects/cube_like/side_table_simple.xml"
    initial_position: [1.0, 0.0, 0.0]
    initial_orientation: [0.0, 0.0, 0.0, 1.0]
    fix_base: true  # table is fixed to ground
  
  - name: "box_1"
    model_path: "assets/scene_objects/box/box.xml"
    initial_position: [0.8, 0.3, 0.8]
    initial_orientation: [0.0, 0.0, 0.0, 1.0]
    fix_base: false  # box can move freely
  
  - name: "box_2"
    model_path: "assets/scene_objects/box/box.xml"
    initial_position: [0.8, -0.3, 0.8]
    initial_orientation: [0.0, 0.0, 0.0, 1.0]
    fix_base: false  # box can move freely

simulation:
  timestep: 0.001
  viewer_dt: 0.02
  gravity: [0.0, 0.0, -9.81]