# usage platform
use_hardware: true
use_simulation: true

# Notice: the config file path should contain  to locate the file 
# from the project directory
robot: "duo_arm"
robot_config: !include hardware/config/duo_monte02_arm_cfg.yaml
gripper: "duo_tool"
gripper_config: !include hardware/config/duo_monte02_gripper_cfg.yaml

# sensor infos
sensor_dicts:
  cameras:
    - name: "head_front_cam"
      type: "ros2_camera"
      cfg: !include hardware/sensors/cameras/config/monte02_headfront_cam.yaml
    - name: "ee_cam_left"
      type: "ros2_camera"
      cfg: !include hardware/sensors/cameras/config/monte02_ee_left_cam.yaml
    - name: "ee_cam_right"
      type: "ros2_camera"
      cfg: !include hardware/sensors/cameras/config/monte02_ee_right_cam.yaml
        
control_frequency: 200
controller_type: "duo_controller"
controller_config: !include controller/config/duo_ik_cfg.yaml

model_type: "duo_model"
model_config:
  name: "duo_arm"
  cfg: !include motion/config/robot_model_cfg_duo_monte02arm.yaml

use_trajectory_planner: false
buffer_type: "duo_buffer"
trajectory_planner_type: "cart_polynomial"
plan_type: "cartesian"
trajectory_config: !include trajectory/config/cartesian_polynomial_traj_cfg.yaml
traj_frequency: 450

simulation: "mujoco"
simulation_config: !include simulation/config/mujoco_monte02_blockstacking_arm_only.yaml

target_site_name: ["targetL_site", "targetR_site"]
tcp_visualization_site: ["TCPL_site", "TCPR_site"]
