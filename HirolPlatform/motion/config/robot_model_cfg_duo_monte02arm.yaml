duo_arm:
  left:
    urdf_path: "assets/monte_02/urdf/monte02_description_V1_3.urdf"
    mesh_offset: "assets/monte_02"
    frames: [
      "link_b0_base", "link_b_wheel_drive_left", "link_b_wheel_drive_right",
      "link_b_sensor_imu", "link_b_sensor_ultrasonic", "link_b_sensor_lidar_front", "link_b_sensor_lidar_rear",
      "link_t0_trunk_base", "link_t1_leg", "link_t2_hip", "link_t3_chest",
      "link_h0_head_base", "link_h1_neck", "link_h2_head",
      "link_l0_arm_base", "link_l1_shoulder_pitch", "link_l2_shoulder_roll", "link_l3_shoulder_yaw",
      "link_l4_elbow_pitch", "link_l5_wrist_yaw", "link_l6_wrist_pitch", "link_l7_wrist_roll",
      "link_l_sensor_ft",
      "link_r0_arm_base", "link_r1_shoulder_pitch", "link_r2_shoulder_roll", "link_r3_shoulder_yaw",
      "link_r4_elbow_pitch", "link_r5_wrist_yaw", "link_r6_wrist_pitch", "link_r7_wrist_roll",
      "link_r_sensor_ft"
    ]
    base_link: "link_b0_base"
    ee_link: "link_l_sensor_ft"
    fixed_base: true
    lock_joints:
      # Lock trunk (t1, t2, t3) at once by referencing from trunk base to chest
      - base: "link_t0_trunk_base"
        end: "link_h2_head"
      - base: "link_t0_trunk_base"
        end: "link_t1_leg"
      # Lock entire right arm to keep only left arm
      - base: "link_t3_chest"
        end: "link_r7_wrist_roll"
      - base: "link_b0_base"
        end: "link_b_wheel_drive_left"
      - base: "link_b0_base"
        end: "link_b_wheel_drive_right"
  
  right:
    urdf_path: "assets/monte_02/urdf/monte02_description_V1_3.urdf"
    mesh_offset: "assets/monte_02"
    frames: [
      "link_b0_base", "link_b_wheel_drive_left", "link_b_wheel_drive_right",
      "link_b_sensor_imu", "link_b_sensor_ultrasonic", "link_b_sensor_lidar_front", "link_b_sensor_lidar_rear",
      "link_t0_trunk_base", "link_t1_leg", "link_t2_hip", "link_t3_chest",
      "link_h0_head_base", "link_h1_neck", "link_h2_head",
      "link_l0_arm_base", "link_l1_shoulder_pitch", "link_l2_shoulder_roll", "link_l3_shoulder_yaw",
      "link_l4_elbow_pitch", "link_l5_wrist_yaw", "link_l6_wrist_pitch", "link_l7_wrist_roll",
      "link_l_sensor_ft",
      "link_r0_arm_base", "link_r1_shoulder_pitch", "link_r2_shoulder_roll", "link_r3_shoulder_yaw",
      "link_r4_elbow_pitch", "link_r5_wrist_yaw", "link_r6_wrist_pitch", "link_r7_wrist_roll",
      "link_r_sensor_ft"
    ]
    base_link: "link_b0_base"
    ee_link: "link_r_sensor_ft"
    fixed_base: true
    lock_joints:
      # Lock trunk (t1, t2, t3)
      - base: "link_t0_trunk_base"
        end: "link_h2_head"
      - base: "link_t0_trunk_base"
        end: "link_t1_leg"
      # Lock entire left arm to keep only right arm
      - base: "link_t3_chest"
        end: "link_l7_wrist_roll"
      - base: "link_b0_base"
        end: "link_b_wheel_drive_left"
      - base: "link_b0_base"
        end: "link_b_wheel_drive_right"
