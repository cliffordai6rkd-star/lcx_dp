duo_controller:
  left:
    type: "ik"
    damping_weight: 0.3
    # ["gaussian_newtown"， "dls", "lm"]
    ik_type: "lm"
    tolerance: 0.0001
    max_iteration: 1000
  right:
    type: "impedance"
    enable_gravity_compensation: false
    # stiffness: [100.0, 100.0, 100.0, 50, 50, 50]
    stiffness: [500.0, 500.0, 500.0, 50, 50, 50]
    # arm_joint_idxes: []
    saturation: 
    min: [-75, -75, -75, -75, -10, -10, -10]
    max: [75, 75, 75, 75, 10, 10, 10]
    #  如果没有下面两项config， diable nullspace
    kp_null: [6.5, 6.5, 3.0, 3.0, 2.0, 1.0, 1.0]
    # kp_null: [0, 0, 0, 0, 0, 0, 0]
    # q_des: [0, -1.3, 0, -2.5, 0, 1.57079, -0.2353] 
    q_des: [0, -0.7836, 0, -2.35, 0, 1.57079, -0.7766]
    dq_damping: 1.5