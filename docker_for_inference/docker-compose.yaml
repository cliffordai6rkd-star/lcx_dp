name: lcx-dp-inference

services:
  dp_inference:
    # build:
    #   context: ..
    #   dockerfile: docker_for_inference/Dockerfile
    #   args:
    #     PYTHON_VERSION: "3.10"
    image: lcx-dp:inference
    user: teleophost
    working_dir: /workspace/HirolPlatform
    command: ["tail", "-f", "/dev/null"]
    stdin_open: true
    tty: true
    network_mode: host
    privileged: true
    environment:
      DISPLAY: ${DISPLAY}
      XAUTHORITY: ${XAUTHORITY:-$HOME/.Xauthority}
      MUJOCO_GL: osmesa
      MPLCONFIGDIR: /tmp/matplotlib
      WANDB_DIR: /workspace/wandb
      DP_HIROL_PATH: /workspace/dp_hirol-main
      PYTHONPATH: /opt/openrobots/lib/python3.10/site-packages:/workspace/HirolPlatform:/workspace/dp_hirol-main:/workspace
      http_proxy:
      https_proxy:
      no_proxy:
    volumes:
      - ../HirolPlatform:/workspace/HirolPlatform
      - ../dp_hirol-main:/workspace/dp_hirol-main
      - ../dp_output:/workspace/dp_output
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XAUTHORITY:-$HOME/.Xauthority}:${XAUTHORITY:-$HOME/.Xauthority}:ro
      - /sys/bus/usb:/sys/bus/usb:ro
      - /sys/class/input:/sys/class/input:ro
    devices:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /dev/input:/dev/input
      - /var/run/dbus:/var/run/dbus
      - /run/dbus:/run/dbus
    gpus: all
    group_add:
      - "plugdev"
      - "input"
      - "dialout"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, graphics, display, utility, video, compute]
