pika_config: !include teleop/pika_tracker/config/pika_as_umi_w_head_cfg.yaml
pika_mode: "absolute_delta"
use_fisheye: true
cameras:
  - name: "left_hand"
    type: "realsense_camera"
    config: !include hardware/sensors/cameras/config/umi_left_rs.yaml
  - name: "right_hand"
    type: "realsense_camera" 
    config: !include hardware/sensors/cameras/config/umi_right_rs.yaml
  - name: "head"
    type: "realsense_camera"
    config: !include hardware/sensors/cameras/config/umi_head_rs.yaml
  - name: "left_hand_fisheye"
    type: "opencv_camera"
    config: !include hardware/sensors/cameras/config/umi_left_fisheye.yaml
  - name: "right_hand_fisheyed"
    type: "opencv_camera"
    config: !include hardware/sensors/cameras/config/umi_right_fisheye.yaml

collection_frequency: 30
task_name: "duo_unitree_pick_n_place"
use_mujoco: true
