# gym interface configuration
max_step_nums: 150
num_episodes: 10
action_type: "joint_position"
reset_space: "joint"
obs_contain_ee: false
is_debug: false
display_window_name: "dp ddim inference"

# diffusion policy model configuration
# checkpoint_path: "/home/yuxuan/Code/hirol/checkpoints/dp/fr3/0917/pick_n_place_abs_jps/epoch=0250-train_loss=0.002411.ckpt"
