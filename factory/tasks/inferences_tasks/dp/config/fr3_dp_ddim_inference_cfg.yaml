checkpoint_path: "/home/yuxuan/Code/hirol/checkpoints/dp/fr3/0926/solid_transfer/latest.ckpt"


# DDIM inference parameters
seed: 42
device: "cuda"  # "cuda" or "cpu"
enable_display: true     # show camera feeds
frequency: 800.0          # Control frequency in Hz
aync_execution: true

# DDIM specific settings
inference_scheduler_type: "ddim"  # "ddim" or "ddpm"
ddim_inference_steps: 16          # DDIM推理步数 (通常8-16步)
num_train_timesteps: 100
ddim_eta: 0.0                     # DDIM eta参数，0.0为确定性采样

# logging configuration
log_level: "info"  # "debug", "info", "warning", "error"

# robot + motion factory
motion_config: !include factory/components/motion_configs/fr3_with_franka_hand_ik.yaml