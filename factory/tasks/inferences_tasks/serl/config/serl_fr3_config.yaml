# SERL Configuration for FR3 Robot
# Based on fr3_with_hand_impedance.yaml with SERL-specific modifications

motion_config:
  # Platform settings
  use_hardware: true
  use_simulation: false  # Disable simulation when using real hardware
  
  # Robot and gripper configuration - inherit from base configs
  robot: "fr3"
  robot_config: !include /home/hanyu/code/HIROLRobotPlatform/hardware/fr3/config/fr3_cfg.yaml
  gripper: "franka_hand"
  gripper_config: !include /home/hanyu/code/HIROLRobotPlatform/hardware/fr3/config/franka_hand_cfg.yaml
  
  # SERL-specific settings
  use_smoother: false  # SERL handles its own trajectory smoothing
  auto_enable_async_control: false  # SERL manages control loop
  use_trajectory_planner: false  # Direct position commands
  
  # Control settings
  control_frequency: 800
  controller_type: "cartesian_impedance"
  controller_config:
    cartesian_impedance:
      enable_gravity_compensation: false
      
      # Stiffness parameters
      translational_stiffness: 2000.0  # N/m
      # rotational_stiffness: 250.0      # Nm/rad
      rotational_stiffness: 150.0 


      # Damping parameters
      translational_damping: 89.0     # Ns/m
      # rotational_damping: 9.0         # Nms/rad
      rotational_damping: 7.0         # Nms/rad
      
      # Integral gain parameters (for steady-state error)
      translational_ki: 0.0
      rotational_ki: 0.0

      # Optional: precision parameters for fine control
      translational_clip_min: [-0.01, -0.01, -0.01]  # meters
      translational_clip_max: [0.01, 0.01, 0.01]      # meters
      rotational_clip_min: [-0.025, -0.025, -0.025]      # radians
      rotational_clip_max: [0.025, 0.025, 0.025]        # radians
      # Torque rate saturation
      delta_tau_max: 1.0  # Nm/s
      
      # Filter parameter for smooth transitions
      filter_params: 0.005
      
      # Joint torque saturation
      saturation:
        min: [-80, -80, -80, -80, -12, -12, -9]
        max: [80, 80, 80, 80, 12, 12, 9]
      nullspace_stiffness: 0.2
      joint1_nullspace_stiffness: 100.0

  # controller_type: "impedance"
  # controller_config:  
  #       impedance:
  #         enable_gravity_compensation: false
  #         # stiffness: [100.0, 100.0, 100.0, 50, 50, 50]
  #         stiffness: [240.0, 240.0, 240.0, 50, 50, 50]
  #         # arm_joint_idxes: []
  #         saturation: 
  #         min: [-40, -40, -40, -40, -12, -12, -12]
  #         max: [40, 40, 40, 40, 12, 12, 12]
  #         #  如果没有下面两项config， diable nullspace
  #         kp_null: [6.5, 6.5, 3.0, 3.0, 2.0, 1.0, 1.0]
  #         # kp_null: [0, 0, 0, 0, 0, 0, 0]
  #         # q_des: [0, -1.3, 0, -2.5, 0, 1.57079, -0.2353] 
  #         q_des: [0, -0.7836, 0, -2.35, 0, 1.57079, -0.7766]
  #         dq_damping: 15

  
  # Model configuration
  model_type: "model"
  model_config:
    name: "fr3_franka_hand"
    cfg: !include /home/hanyu/code/HIROLRobotPlatform/motion/config/robot_model_fr3_cfg.yaml
  
  # Buffer and trajectory settings (disabled for SERL)
  buffer_type: "buffer"
  trajectory_planner_type: "cart_polynomial"
  plan_type: "cartesian"
  trajectory_config: !include /home/hanyu/code/HIROLRobotPlatform/trajectory/config/cartesian_polynomial_traj_cfg.yaml
  traj_frequency: 450
  
  # Simulation configuration
  simulation: "mujoco"
  simulation_config: !include /home/hanyu/code/HIROLRobotPlatform/simulation/config/mujoco_fr3_scene.yaml
  target_site_name: ["target_site"]
  tcp_visualization_site: ["TCP_site"]

