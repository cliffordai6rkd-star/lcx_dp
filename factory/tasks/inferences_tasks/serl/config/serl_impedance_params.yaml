# SERL Impedance Parameters for Different Compliance Modes
# These can be loaded dynamically during runtime

# Normal operation mode - softer for safe interaction
normal_mode:
  translational_stiffness: 1500.0
  translational_damping: 80.0
  rotational_stiffness: 100.0
  rotational_damping: 10.0
  translational_ki: 0.0
  rotational_ki: 0.0

# Precision mode - stiffer for accurate positioning
precision_mode:
  translational_stiffness: 2000.0
  translational_damping: 89.0
  rotational_stiffness: 150.0
  rotational_damping: 7.0
  translational_ki: 0.0
  rotational_ki: 0.0

# Reset mode - intermediate stiffness for reset movements
reset_mode:
  translational_stiffness: 1800.0
  translational_damping: 85.0
  rotational_stiffness: 120.0
  rotational_damping: 8.0
  translational_ki: 0.0
  rotational_ki: 0.0

# Soft mode - very compliant for delicate tasks
soft_mode:
  translational_stiffness: 800.0
  translational_damping: 60.0
  rotational_stiffness: 50.0
  rotational_damping: 5.0
  translational_ki: 0.0
  rotational_ki: 0.0

# Stiff mode - for tasks requiring high precision
stiff_mode:
  translational_stiffness: 3000.0
  translational_damping: 100.0
  rotational_stiffness: 200.0
  rotational_damping: 10.0
  translational_ki: 0.0
  rotational_ki: 0.0

# Teaching mode - extremely compliant for human guidance
teaching_mode:
  translational_stiffness: 200.0
  translational_damping: 40.0
  rotational_stiffness: 20.0
  rotational_damping: 3.0
  translational_ki: 0.0
  rotational_ki: 0.0