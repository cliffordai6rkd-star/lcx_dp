# FR3 ACT Inference Configuration
# Unified configuration for ACT inference task following factory pattern

# Gym interface configuration (replaces direct RobotFactory/MotionFactory usage)
motion_config: !include factory/components/motion_configs/left_fr3_with_pika_ati_ik.yaml

# Robot type configuration
robot_type: "fr3"

# Checkpoint path for ACT model
checkpoint_path: "learning/ckpts/fr3_bs_1013_50ep"
# checkpoint_path: "learning/ckpts/fr3_pih_0918_48ep_ds"
# checkpoint_path: "learning/ckpts/fr3_liquid_transfer_0920_50ep_ds"
# checkpoint_path: "learning/ckpts/fr3_st_0928_56ep_rs"
# checkpoint_path: "learning/ckpts/fr3_bs_0916_50ep_ltaug"

# Inference frequency and control parameters
frequency: 20.0  # Hz - inference execution frequency
device: "cuda"   # "cuda" or "cpu"

# Episode configuration
num_episodes: 20
# max_step_nums: 2000
# Action type configuration (required by InferenceBase)
action_type: "joint_position"
action_orientation_type: "euler"
obs_contain_ee: false
is_debug: false

# Display configuration (required by InferenceBase)
enable_display: false
display_window_name: "ACT_Inference_FR3"

# Learning algorithm configuration
learning:
  algorithm: "ACT"
  state_dim: 8  # FR3: 7 DOF arm + 1 DOF gripper
  camera_names: ["ee_cam", "third_person_cam", "side_cam"]

  # ACT model architecture parameters (required for inference)
  num_queries: 100  # chunk_size
  hidden_dim: 512
  dim_feedforward: 3200
  enc_layers: 4
  dec_layers: 7
  nheads: 8
  backbone: "resnet18"

  # Data processing parameters
  normalize_images: true
  image_target_size: [480, 640]  # [height, width]

# ACT-specific action sequence management
action_chunk_size: 100
action_sampling_interval: 1
max_failed_actions: 5
sliding_window_size: 10

# Action interpolation for smoothness
enable_action_interpolation: true
interpolation_steps: 3

# Camera latency compensation
camera_latency_ms: 80.0  # Camera latency in milliseconds

# Action aggregation configuration
action_aggregation:
  enabled: true

  joint_smoothing_enabled: true
  gripper_smoothing_enabled: false
  joint_ema_alpha: 0.5
  gripper_ema_alpha: 0.6

  window_size: 30
  method: 'mean'

  # Discontinuity detection and correction
  discontinuity_threshold: 0.12
  discontinuity_smooth_factor: 0.3

# Gripper post-processing configuration
gripper_postprocess:
  enabled: true
  control_mode: "task_aware"  # "binary" or "incremental"

  # Simple threshold control parameters
  simple_threshold: 0.55

  # Trend detection parameters
  trend_window_size: 8
  closing_trend_threshold: -0.0005
  opening_trend_threshold: 0.0005

  # Holding state parameters
  holding_stability_threshold: 0.003
  min_holding_steps: 45

  # End-effector stability detection
  stability_threshold: 0.03
  min_stable_steps: 5

# Joint position visualization
joint_position_visualization:
  enabled: false
  save_data: false
  plot_real_time: false
  joint_names: ["jp1", "jp2", "jp3", "jp4",
                "jp5", "jp6", "jp7", "Gripper"]

# Image display configuration
visualization:
  enable_image_display: true
  display_window_size: [640, 480]
  display_refresh_rate: 15

# Debug configuration
debug:
  save_action_history: false
  verbose_logging: false

# 夹爪动作值可视化配置
gripper_visualization:
  enabled: true                          # 启用夹爪动作值实时可视化
  auto_start_plot: true                  # 自动启动绘图窗口
  max_points: 500000                         # 最大显示数据点数
  update_interval: 0.1                    # 更新间隔 (秒)
  save_data: true                         # 保存数据到CSV文件
  save_path: "./logs/gripper_actions.csv" # 数据保存路径
  log_file_monitor: ""                    # 可选：监听日志文件路径（用于独立运行）