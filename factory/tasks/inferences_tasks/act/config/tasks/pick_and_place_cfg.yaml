# 抓放任务特定配置
task_type: "pick_and_place"
max_step_nums: 500

# 抓放任务的checkpoint路径模式
checkpoint_patterns:
  - "fr3_pick_and_place*"
  - "fr3_pp_*"
  - "fr3_pickplace*"
  - "*pick*place*"

# 夹爪控制策略配置
gripper_postprocess:
  enabled: true
  control_mode: "task_aware"  # 使用任务感知控制

  # 抓放任务特定参数
  close_value_threshold: 0.02
  open_value_threshold: 0.95
  required_close_duration: 0.4  # 抓放任务需要0.4s确认

  # 趋势检测参数
  trend_window_size: 8
  closing_trend_threshold: -0.0005
  opening_trend_threshold: 0.0005

  # 波形检测参数（用于打开检测）
  target_peak_count: 3
  peak_threshold: 0.95
  valley_threshold: 0.02

  # 保持参数
  min_holding_steps: 40  # 抓放保持时间适中

  # 抓取检测参数
  grasp_check_enabled: true
  grasp_check_delay: 50  # 抓放检测时间适中
  max_grasp_retries: 3
  retry_wait_time: 20
  min_grasp_width: 0.005
  max_grasp_width: 0.070

  # 任务完成检测
  task_completion_enabled: true
  task_completion_stable_time: 18
  task_completion_position_threshold: 0.005
  task_completion_max_holding: 85
  task_completion_force_open: true  # 抓放完成后可以打开
