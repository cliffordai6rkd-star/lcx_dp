# gym
# reset_arm_command: [3.69019823e-01,  1.99873044e-04,  3.64437265e-01,  9.99989858e-01,
#                     -2.65401198e-03, -1.43284955e-03,  3.34460145e-03]
# reset_space: "cartesian"
# robot + motion factory
motion_config: !include factory/components/motion_configs/left_fr3_with_pika_ati_ik.yaml
max_step_nums: 150 # for gym steps
# end_effector_pose_delta joint_position
action_type: "joint_position"
# euler quaternion
action_orientation_type: "euler"
# jonit_position ee_pose jonit_position_ee_pose mask delta_ee_pose ft_only
observation_type: "jonit_position"
contain_ft: false
is_debug: false

reset_space: "joint"
# reset_arm_command: [-0.0016708960744338654, -0.7861180279768628, 
#                       0.0011242960248884306, -2.3515749674770583, 
#                       -0.0019059956649008665, 1.581831610375827, 
#                       0.7904221443917989]
reset_tool_command: [[1]]

tool_control_mode: "incremental"
tool_min: 0
tool_max: 90
# tool_control_mode: "binary"
# tool_open_thresh: 45
# tool_close_thresh: 45

enable_display: false
display_window_name: "pi0 client inference"
enable_plotting: false
enable_hardware: true

num_episodes: 150
max_timestamps: 1500
execution_chunk_steps: 35
action_weight_mode: "uniform"
action_weight_gain: -0.01
async_execution: false
# data_save_path: "infer/insert_pinboard"

# prompt guidance
# tasks: "pick up the blue cube and place it onto the top of red cube and then pick up the yellow cube and place it onto the blue cube"
# tasks: "pick up the peg out of the stack and put it into the hole"
# tasks: "grasp the right cup and pour it into the left cup"
# tasks: "collect a portion of rice with spoon and transfer it into the bowl"
# tasks: "grab the tube from the upper-left of the rack and insert it into the lower-right hole"
# tasks: "pick up the kiwi fruit and place it into the red box"
tasks: "grasp the white pin board and insert it into the red board slot"
