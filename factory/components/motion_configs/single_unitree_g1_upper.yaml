# usage platform
use_hardware: true
use_simulation: true

# Notice: the config file path should contain ../ to locate the file
# from the project directory
robot: "unitree_g1"
robot_config: !include hardware/unitreeG1/config/single_unitree_g1_upper.yaml
gripper: "zmq_pika_gripper"
gripper_config: !include hardware/tools/grippers/config/zmq_single_pika_gripper_cfg.yaml
# head: "zmq_servo_head"
# head_config: !include hardware/head/config/zmq_servo_head_cfg.yaml

use_smoother: true
smoother_type: "ruckig" #critical_damped
smoother_config: !include smoother/config/smoother_config_single_unitree_g1_only_upper.yaml
async_control_frequency: 500.0     # Async thread sends commands at this rate (Hz)
auto_enable_async_control: true    # Auto-enable async mode on initialization (new!)

control_frequency: 300
controller_type: "whole_body_ik"
controller_config: !include controller/config/whole_body_ik_single_unitree_g1_upper.yaml

sensor_dicts:
  cameras:
    # - name: "head"
    #   type: "zmq_camera"
    #   cfg: !include hardware/sensors/cameras/config/zmq_head_cfg.yaml
    - name: "right"
      type: "zmq_camera"
      cfg: !include hardware/sensors/cameras/config/zmq_right_hand_cfg.yaml
    - name: "right_fisheye"
      type: "zmq_camera"
      cfg: !include hardware/sensors/cameras/config/zmq_right_fisheye_cfg.yaml

model_type: "model"
model_config:
  name: "unitree_g1_only_upper"
  cfg: !include motion/config/robot_model_cfg_single_unitree_g1_only_upper.yaml
  
use_trajectory_planner: false
buffer_type: "duo_buffer"
trajectory_planner_type: "cart_polynomial"
plan_type: "cartesian"
trajectory_config: !include trajectory/config/cartesian_polynomial_traj_cfg.yaml
traj_frequency: 450

simulation: "mujoco"
simulation_config: !include simulation/config/mujoco_single_unitree_g1_only_upper.yaml
target_site_name: ["targetR_site", "head_site"]
tcp_visualization_site: ["TCPR_site"]
