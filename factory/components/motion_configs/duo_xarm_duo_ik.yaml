#       # cfg: !include hardware/sensors/cameras/config/obec_bolt_config.yaml
#       cfg: !include hardware/sensors/cameras/config/netcam_cfg_third_person.yaml
      

control_frequency: 500
controller_type: "duo_controller"
controller_config: !include controller/config/duo_ik_cfg.yaml

model_type: "duo_model"
model_config:
  name: "duo_xarm7_xarm_gripper"
  cfg: !include motion/config/robot_model_cfg_duo_xarm7.yaml

use_trajectory_planner: false
buffer_type: "duo_buffer"
trajectory_planner_type: "cart_polynomial"
plan_type: "cartesian"
trajectory_config: !include trajectory/config/cartesian_polynomial_traj_cfg.yaml
traj_frequency: 450

simulation: "mujoco"
simulation_config: !include simulation/config/mujoco_duo_xarm7.yaml
target_site_name: ["targetL_site", "targetR_site"]
tcp_visualization_site: ["TCPL_site", "TCPR_site"]
