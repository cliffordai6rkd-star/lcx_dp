# usage platform
use_hardware: true
use_simulation: true

robot: "duo_arm"
robot_config: !include hardware/config/duo_xarm7_cfg.yaml
gripper: "duo_tool"
gripper_config: !include hardware/config/duo_xarm_gripper_cfg.yaml

use_smoother: true
smoother_type: "ruckig" #critical_damped
smoother_config: !include smoother/config/monte_smoother_cfg.yaml
# Async control configuration
# This creates true decoupling between low-freq planning and high-freq control
async_control_frequency: 500.0     # Async thread sends commands at this rate (Hz)
auto_enable_async_control: true    # Auto-enable async mode on initialization (new!)

